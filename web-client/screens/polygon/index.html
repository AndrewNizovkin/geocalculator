<!DOCTYPE html>
<html lang="ru">
<head>
  <title>taheoport</title>
  <meta charset="utf-8">
  <meta name="author" content="taheoport.ru">
  <meta name="keywords" content="топография, геодезия, тахеометрия, тахеометр, теодолитный ход">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"> -->
  <link href="../../styles/style.css" rel="stylesheet" type="text/css">

</head>
<body>

    <div class="content"  id="content">

        <div class="survey-toolbar" id="toolbar-polygon">
            <div class="survey-button new" id="polygon-new" title="Новый полигон"></div>
            <div class="survey-button open" id="polygon-open" title="Открыть"></div>

            <div class="survey-toolbar-separator"></div>

            <div class="survey-button run" id="polygon-run" title="Уравнять полигон"></div>
            <div class="survey-button view" id="polygon-view" title="Просмотр результатов"></div>
            <input type="file" id="polygon-open-input" accept=".pol">
            <input type="file" id="polygon-open-response" accept=".txt">
        </div>

        <div class="panel" id="panel-polygon">

            <div class="survey-toolbar" id="toolbar-polygon-table">
                <div class="survey-button delete" id="delete-station" title="Удалить станцию"></div>
                <div class="survey-button insert-before" id="before-station" title="Вставить перед выбранной"></div>
                <div class="survey-button insert-after" id="after-station" title="Вставить после выбранной"></div>
                <div class="survey-button catalog toggle" id="catalog" title="Вставить из каталога"></div>
            </div>


            <div class="panel" id="scrollpanel-polygon">

                <table class="table-polygon">
                    <thead>
                        <th title="Название точки">Название</th>
                        <th title="Горизонтальный угол левый, г.ммсс">&#946;<span>лев</span></th>
                        <th title="Горизонтальное проложение, м.">L<span>гор</span></th>
                        <th title="Превышение, м.">&#916;Z</th>
                        <th title="Координата X, м.">X</th>
                        <th title="Координата Y, м.">Y</th>
                        <th title="Координата Z, м.">Z</th>
                        <th title="Планово-высотная опорная сеть">ПВОС</th>
                    </thead>
                    <tbody id="list-poligon-stations">
                        <!-- Демо данные -->
                        <tr class="selected">
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="name" size="10" value="1302"></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="hor-angle" size="10" value="359.5959"></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="hor-distanse" size="10" value="150.999"/></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="elevation" size="10" value="-0.999"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="x" size="10" value="2222222.222"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="y" size="10" value="444444.444"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="y" size="10" value="297.356"></td>
                            <td class="line">
                                <div class="table-cell">
                                    <input type="checkbox" data-poligon-station-id="0" data-poligon-station="status" checked>
                                </div>
                                
                            </td>
                        </tr>
                        <tr>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="name" size="10" value="1302"></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="hor-angle" size="10" value="359.5959"></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="hor-distanse" size="10" value="150.999"/></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="elevation" size="10" value="-0.999"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="x" size="10" value="2222222.222"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="y" size="10" value="444444.444"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="y" size="10" value="297.356"></td>
                            <td class="line">
                                <div class="table-cell">
                                    <input type="checkbox" data-poligon-station-id="0" data-poligon-station="status" checked>
                                </div>
                                
                            </td>
                        </tr>
                        <tr>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="name" size="10" value="1302"></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="hor-angle" size="10" value="359.5959"></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="hor-distanse" size="10" value="150.999"/></td>
                            <td class="line-shift"><input type="text" data-poligon-station-id="0" data-poligon-station="elevation" size="10" value="-0.999"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="x" size="10" value="2222222.222"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="y" size="10" value="444444.444"></td>
                            <td class="line"><input type="text" data-poligon-station-id="0" data-poligon-station="y" size="10" value="297.356"></td>
                            <td class="line">
                                <div class="table-cell">
                                    <input type="checkbox" data-poligon-station-id="0" data-poligon-station="status" checked>
                                </div>
                                
                            </td>
                        </tr>
                        <!-- Демо данные -->
                    </tbody>

                </table>

            </div>
        </div>

        <div class="panel" id="panel-polygon-processing">

            <div class="panel" id="panel-polygon-residuals">
                
                <div class="panel-title">Невязки фактические</div>

                <div class="row-residual">
                    <div>Высотная, м.</div>
                    <div id="residual-height"></div>
                </div>

                <div class="row-residual">
                    <div>Угловая, сек.</div>
                    <div id="residual-direction"></div>
                </div>
                
                <div class="row-residual">
                    <div>Линейная Fx, м.</div>
                    <div id="residual-x"></div>
                </div>                

                <div class="row-residual">
                    <div>Линейная Fy, м.</div>
                    <div id="residual-y"></div>
                </div>                

                <div class="row-residual">
                    <div>Абсолютная, м.</div>
                    <div id="residual-absolute"></div>
                </div>                

                <div class="row-residual">
                    <div>Относительная</div>
                    <div id="residual-relative"></div>
                </div>                

                <div class="row-residual">
                    <div>Периметр</div>
                    <div id="residual-perimeter"></div>
                </div>                


            </div>

            <div class="panel" id="panel-valid-residuals">

                <div class="panel-title">Невязки допустимые</div>

                <div class="row-residual">
                    <div>Высотная, м.</div>
                    <select id="vilid-height">
                        <option value="5">5&#8730;L</option>
                        <option value="10">10&#8730;L</option>
                        <option value="20">20&#8730;L</option>
                        <option value="50" selected>50&#8730;L</option>
                    </select>
                </div>

                <div class="row-residual">
                    <div>Угловая, сек.</div>
                    <select id="vilid-direction">
                        <option value="2;n">2&#8730;n</option>
                        <option value="5">5&#8730;n</option>
                        <option value="10">10&#8730;n</option>
                        <option value="20" selected>20&#8730;n</option>
                        <option value="30">30&#8730;n</option>
                    </select>
                </div>
                
                <div class="row-residual">
                    <div>Абсолютная, м.</div>
                    <select id="vilid-absolute">
                        <option value="0.01">0.01</option>
                        <option value="0.05">0.05</option>
                        <option value="0.10">0.10</option>
                        <option value="0.20" selected>0.20</option>
                        <option value="0.30">0.30</option>
                    </select>
                </div>                

                <div class="row-residual">
                    <div>Относительная</div>
                    <select id="vilid-relative">
                        <option value="1:1000">1:1000</option>
                        <option value="1:2000" selected>1:2000</option>
                        <option value="1:5000">1:5000</option>
                        <option value="1:10000">1:10000</option>
                        <option value="1:20000">1:20000</option>
                    </select>
                </div>                


            </div>

        </div>






    </div>



</body>
</html>
